name: Release macOS App on Tag

on:
  push:
    tags:
      - "*"

jobs:
  build-macos-app:
    name: Build and release macOS app
    runs-on: macos-14
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install macOS native dependencies
        run: |
          command -v pkg-config >/dev/null 2>&1 || brew install pkgconf
          brew list opus >/dev/null 2>&1 || brew install opus
          OPUS_PKGCONFIG_DIR="$(brew --prefix opus)/lib/pkgconfig"
          echo "PKG_CONFIG_PATH=${OPUS_PKGCONFIG_DIR}:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"

      - name: Package app bundle
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          APP_VERSION="${VERSION}" bash apps/host-app-gpui/scripts/package_macos_app.sh

      - name: Archive .app bundle
        run: |
          mkdir -p release-artifacts
          ARCHIVE_NAME="AI-Meeting-Host-${GITHUB_REF_NAME}-macos.zip"
          ARCHIVE_PATH="release-artifacts/${ARCHIVE_NAME}"
          ditto -c -k --sequesterRsrc --keepParent \
            "apps/host-app-gpui/dist/AI Meeting Host.app" \
            "${ARCHIVE_PATH}"

      - name: Install ORAS CLI
        uses: oras-project/setup-oras@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package to GitHub Packages
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_BASE="ghcr.io/${OWNER}/ai-meeting-host-macos"
          PACKAGE_REF_TAG="${PACKAGE_BASE}:${TAG_NAME}"
          CHANNEL_TAG="latest"
          if [[ "${TAG_NAME}" == *"pre"* ]]; then
            CHANNEL_TAG="pre"
          fi
          PACKAGE_REF_CHANNEL="${PACKAGE_BASE}:${CHANNEL_TAG}"
          ARCHIVE_PATH="release-artifacts/AI-Meeting-Host-${TAG_NAME}-macos.zip"

          push_package() {
            local ref="$1"
            oras push "${ref}" \
              --artifact-type application/vnd.ai-meeting-host.macos.zip \
              --annotation "org.opencontainers.image.title=AI Meeting Host macOS" \
              --annotation "org.opencontainers.image.version=${TAG_NAME}" \
              --annotation "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
              "${ARCHIVE_PATH}:application/zip"
          }

          push_package "${PACKAGE_REF_TAG}"
          if [[ "${PACKAGE_REF_CHANNEL}" != "${PACKAGE_REF_TAG}" ]]; then
            push_package "${PACKAGE_REF_CHANNEL}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Meeting-Host-${{ github.ref_name }}-macos-app
          path: apps/host-app-gpui/dist/AI Meeting Host.app
          if-no-files-found: error

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/AI-Meeting-Host-${{ github.ref_name }}-macos.zip
          generate_release_notes: true
